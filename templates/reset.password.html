<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Nova senha</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">TaskFlow</span>
    </div>

    <div class="auth-card">
      <div id="panel-form">
        <h2>Nova senha</h2>
        <p class="subtitle">Escolha uma senha segura para sua conta.</p>
        <div class="form-group">
          <label>Nova senha</label>
          <input type="password" id="new-password" placeholder="mínimo 6 caracteres"/>
        </div>
        <div class="form-group">
          <label>Confirmar senha</label>
          <input type="password" id="confirm-password" placeholder="repita a senha"/>
        </div>
        <div id="reset-error"   class="msg-error   hidden"></div>
        <div id="reset-success" class="msg-success hidden"></div>
        <button class="btn-primary" id="btn-reset">Salvar nova senha</button>
      </div>

      <div id="panel-invalid" class="hidden" style="text-align:center; padding: 16px 0;">
        <div style="font-size:36px; margin-bottom:12px;">⚠️</div>
        <h2>Link inválido</h2>
        <p class="subtitle" style="margin-top:8px;">Este link de recuperação é inválido ou já foi utilizado.</p>
        <a href="/" class="btn-primary" style="display:block; margin-top:16px; text-decoration:none; text-align:center;">Ir para o login</a>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.hostname.includes('localhost')
      ? 'http://localhost:5000/api'
      : 'https://minhastafefas.up.railway.app/api';

    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('panel-form').classList.add('hidden');
      document.getElementById('panel-invalid').classList.remove('hidden');
    }

    const btnReset = document.getElementById('btn-reset');
    if (btnReset) btnReset.dataset.label = btnReset.textContent;

    function showError(msg) {
      const el = document.getElementById('reset-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError() { document.getElementById('reset-error').classList.add('hidden'); }

    btnReset && btnReset.addEventListener('click', async () => {
      hideError();
      const password = document.getElementById('new-password').value.trim();
      const confirm  = document.getElementById('confirm-password').value.trim();

      if (!password || !confirm) { showError('Preencha os dois campos.'); return; }
      if (password.length < 6)   { showError('A senha deve ter pelo menos 6 caracteres.'); return; }
      if (password !== confirm)  { showError('As senhas não coincidem.'); return; }

      btnReset.disabled    = true;
      btnReset.textContent = 'Salvando...';

      try {
        const res  = await fetch(`${API}/users/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (!res.ok) { showError(data.error || 'Erro ao redefinir senha.'); return; }

        document.getElementById('reset-success').textContent = 'Senha redefinida! Redirecionando para o login...';
        document.getElementById('reset-success').classList.remove('hidden');
        setTimeout(() => window.location.href = '/', 2500);

      } catch {
        showError('Erro de conexão. Tente novamente.');
      } finally {
        btnReset.disabled    = false;
        btnReset.textContent = btnReset.dataset.label;
      }
    });
  </script>
</body>
</html>
